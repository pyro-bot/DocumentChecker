default_model: gpt-oss:120b-cloud

endpoints:
  - id: ollama-cloud
    url: https://ollama.com/api/chat
    api_format: ollama
    api_key_env: OLLAMA_API_KEY

  - id: timeweb-openai
    base_url: https://api.timeweb.ai/v1
    api_format: openai
    api_key_env: AI_PROXY_KEY

  - id: nanogpt
    base_url: https://nano-gpt.com/api/v1
    api_format: nanogpt
    api_key_env: NANOGPT_API_KEY

models:
  - id: gpt-oss:120b-cloud
    request_model: gpt-oss:120b
    endpoint: ollama-cloud
    name: Средняя модель без гарантии доступности
    description: Средненые модели без гарантии доступности
    usage_limit: 10

  - id: openai/gpt-5-nano
    endpoint: timeweb-openai
    name: Базовая модель
    description: Базовая модель
    usage_limit: 2

  - id: deepseek/deepseek-v4-flash
    endpoint: timeweb-openai
    name: Улучшенная модель
    description: Модель с большей точностью
    usage_limit: 1

